services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:18000/api/v1
        NEXT_PUBLIC_BROWSER_LIVE_BASE: http://localhost:16080
    container_name: ainative-web
    ports:
      - "13000:3000"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: ainative-api
    ports:
      - "18000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ainative
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ainative-files
      AI_NATIVE_OS_HOME: /root/.ai-web-os
      BROWSER_RUNTIME_URL: http://browser-runtime:18100
    volumes:
      - api_home:/root/.ai-web-os
    depends_on:
      - postgres
      - redis
      - minio
      - qdrant
      - browser-runtime

  browser-runtime:
    build:
      context: ..
      dockerfile: infra/browser-runtime/Dockerfile
    container_name: ainative-browser-runtime
    environment:
      BROWSER_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:13000,http://127.0.0.1:13000,http://localhost:16080,http://127.0.0.1:16080
      BROWSER_GLOBAL_STORAGE_ENABLED: "false"
      BROWSER_VNC_PASSWORD: "${BROWSER_VNC_PASSWORD:-}"
    ports:
      - "18100:18100"
      - "16080:6080"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ainative-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ainative
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ainative-redis
    ports:
      - "16379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ainative-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ainative-qdrant
    ports:
      - "16333:6333"   # REST API
      - "16334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -lc '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  api_home:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
